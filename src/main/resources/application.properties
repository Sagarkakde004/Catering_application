# Catering Management System Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/catering

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/catering_db
spring.datasource.username=catering_user
spring.datasource.password=catering_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging Configuration
logging.level.com.catering=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,file:src/main/webapp/
spring.mvc.static-path-pattern=/static/**

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Application Configuration
app.name=Catering Management System
app.version=1.0.0
app.description=Complete web-based catering services management application

